<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>prasanth  Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #7d1dea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .calculator {
      background: #3d1edb;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    h2 {
      margin-bottom: 20px;
      color: #dcc8cf;
    }
    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }
    button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #e0e0e0;
      transition: background 0.2s;
    }
    button:hover {
      background: #d4d4d4;
    }
    .result {
      margin-top: 15px;
      font-size: 1.2em;
      font-weight: bold;
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>prasanth  Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>
    
    <button onclick="add()">Add (+)</button>
    <button onclick="subtract()">Subtract (−)</button>
    <button onclick="multiply()">Multiply (*)</button>
    <button onclick="divide()">Divide (÷)</button>
    

    <div class="result">Result: <span id="result"></span></div>
  </div>

  <script>
    function add() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = a + b;
    }

    function subtract() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = a - b;
    }

    function multiply() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = a * b;
    }

    function divide() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      if (b === 0) {
        document.getElementById("result").innerText = "Error: Division by zero";
      } else {
        document.getElementById("result").innerText = a / b;
      }
    }
  </script>
</body>
</html>
